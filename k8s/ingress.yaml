apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: transformhub-ingress
  namespace: transformhub
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "25m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # SSE streaming support for agent execution events
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  tls:
    - hosts:
        - app.transformhub.io
        - api.transformhub.io
      secretName: transformhub-tls
  rules:
    - host: app.transformhub.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nextjs-app-svc
                port:
                  number: 3000
    - host: api.transformhub.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-service-svc
                port:
                  number: 8000
