# IMPORTANT: This is a template. Populate values via CI/CD or external secrets operator.
# Never commit real secrets to source control.
apiVersion: v1
kind: Secret
metadata:
  name: transformhub-secrets
  namespace: transformhub
  annotations:
    # Use External Secrets Operator or sealed-secrets in production
    secrets.transformhub.io/managed-by: "external-secrets"
type: Opaque
stringData:
  # Database
  DATABASE_URL: "postgresql://transformhub:CHANGE_ME@postgres-svc:5432/transformhub"
  DATABASE_READ_URL: ""  # Optional read replica URL
  # Auth
  ANTHROPIC_API_KEY: "CHANGE_ME"
  NEXTAUTH_SECRET: "CHANGE_ME_32_CHAR_RANDOM_STRING"
  # Optional providers
  AZURE_OPENAI_API_KEY: ""
  AZURE_OPENAI_ENDPOINT: ""
  AZURE_OPENAI_DEPLOYMENT: ""
  OPENAI_API_KEY: ""
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  AZURE_AD_CLIENT_ID: ""
  AZURE_AD_CLIENT_SECRET: ""
  AZURE_AD_TENANT_ID: ""
  # Redis auth (if using Redis AUTH)
  REDIS_URL: ""
