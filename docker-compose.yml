services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: transformhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transformhub}
      POSTGRES_USER: ${POSTGRES_USER:-transformhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transformhub}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: transformhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nextjs-app:
    build:
      context: ./nextjs-app
      dockerfile: Dockerfile
    container_name: transformhub-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-transformhub}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-transformhub}
      AGENT_SERVICE_URL: http://agent-service:8000
      API_KEY: ${API_KEY:-}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-use-openssl-rand-base64-32}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: transformhub-agents
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-transformhub}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-transformhub}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  agent-worker:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: transformhub-worker
    restart: unless-stopped
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-transformhub}:${POSTGRES_PASSWORD:?err}@postgres:5432/${POSTGRES_DB:-transformhub}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?Set ANTHROPIC_API_KEY in .env}
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import redis; r=redis.Redis.from_url(\"redis://redis:6379\"); r.ping()'"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
