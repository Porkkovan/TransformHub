# =============================================================================
# TransformHub - Nginx Reverse Proxy Configuration
# =============================================================================
# Handles SSL termination, rate limiting, security headers, gzip compression,
# WebSocket/SSE support, and reverse proxying to internal services.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones
# ---------------------------------------------------------------------------
# General API rate limit: 30 requests/second per client IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Stricter limit for auth-related endpoints: 5 requests/second
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# Agent execution endpoints: 10 requests/second
limit_req_zone $binary_remote_addr zone=agent_limit:10m rate=10r/s;

# ---------------------------------------------------------------------------
# Upstream definitions
# ---------------------------------------------------------------------------
upstream nextjs_backend {
    server nextjs-app:3000;
    keepalive 32;
}

upstream agent_backend {
    server agent-service:8000;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# HTTP -> HTTPS redirect
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Allow health checks over HTTP
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name _;

    # -----------------------------------------------------------------------
    # SSL Configuration
    # -----------------------------------------------------------------------
    # Replace these with actual certificate paths in production.
    # For Let's Encrypt, typically:
    #   /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    #   /etc/letsencrypt/live/yourdomain.com/privkey.pem
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -----------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -----------------------------------------------------------------------
    # Gzip Compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # -----------------------------------------------------------------------
    # General proxy settings
    # -----------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # -----------------------------------------------------------------------
    # Client limits
    # -----------------------------------------------------------------------
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # -----------------------------------------------------------------------
    # Agent Service API: /api/v1/*
    # -----------------------------------------------------------------------
    # SSE / WebSocket streaming endpoints (no buffering, extended timeouts)
    location ~ ^/api/v1/agents/stream/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://agent_backend;
        proxy_set_header Connection "";

        # SSE-specific: disable buffering so events arrive immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;

        # Ensure nginx does not buffer the SSE stream
        add_header X-Accel-Buffering "no";
        add_header Cache-Control "no-cache";

        # Re-add security headers (add_header in location blocks replaces parent)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Chat streaming endpoint
    location = /api/v1/chat/stream {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://agent_backend;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;

        add_header X-Accel-Buffering "no";
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Agent execution endpoints (stricter rate limit)
    location ~ ^/api/v1/agents/execute {
        limit_req zone=agent_limit burst=5 nodelay;

        proxy_pass http://agent_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # Pipeline execution (stricter rate limit)
    location ~ ^/api/v1/pipeline/execute {
        limit_req zone=agent_limit burst=3 nodelay;

        proxy_pass http://agent_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # All other agent-service API routes
    location /api/v1/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://agent_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # -----------------------------------------------------------------------
    # NextAuth / Auth endpoints (stricter rate limit)
    # -----------------------------------------------------------------------
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://nextjs_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 15s;
    }

    # -----------------------------------------------------------------------
    # Next.js API routes (non-agent)
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://nextjs_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # -----------------------------------------------------------------------
    # Next.js static assets (long cache, no rate limit)
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://nextjs_backend;
        proxy_set_header Connection "";
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------------------------
    # Next.js catch-all (pages, SSR)
    # -----------------------------------------------------------------------
    location / {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://nextjs_backend;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
    }

    # -----------------------------------------------------------------------
    # Nginx health check
    # -----------------------------------------------------------------------
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
