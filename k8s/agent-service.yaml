---
apiVersion: v1
kind: Service
metadata:
  name: agent-service-svc
  namespace: transformhub
  labels:
    app: agent-service
spec:
  selector:
    app: agent-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: transformhub
  labels:
    app: agent-service
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: agent-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/api/v1/metrics"
        prometheus.io/port: "8000"
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: agent-service
          image: ghcr.io/transformhub/agent-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: transformhub-config
            - secretRef:
                name: transformhub-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                # Allow in-flight agent executions to finish (up to 60s)
                command: ["/bin/sh", "-c", "sleep 10"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-service-hpa
  namespace: transformhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
---
# ARQ background worker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-worker
  namespace: transformhub
  labels:
    app: agent-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agent-worker
  template:
    metadata:
      labels:
        app: agent-worker
    spec:
      terminationGracePeriodSeconds: 120
      containers:
        - name: agent-worker
          image: ghcr.io/transformhub/agent-service:latest
          command: ["arq", "app.worker.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: transformhub-config
            - secretRef:
                name: transformhub-secrets
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 4
              memory: 8Gi
